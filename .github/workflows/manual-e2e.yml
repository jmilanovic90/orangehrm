name: Manual Cypress E2E

on:
  workflow_dispatch:
    inputs:
      browser:
        description: Browser used for the Cypress run
        required: true
        default: chrome
        type: choice
        options:
          - chrome
          - electron

jobs:
  e2e:
    name: Cypress E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: |
          npm run lint
          npm run format:check

      - name: Run Cypress tests
        run: npm run test:allure -- --browser "${{ inputs.browser }}"
        env:
          CYPRESS_BASE_URL: ${{ vars.CYPRESS_BASE_URL || 'https://opensource-demo.orangehrmlive.com' }}
          ORANGEHRM_USERNAME: ${{ secrets.ORANGEHRM_USERNAME }}
          ORANGEHRM_PASSWORD: ${{ secrets.ORANGEHRM_PASSWORD }}

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
